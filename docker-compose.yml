services:
  # 后端 API (FastAPI)
  api:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MEMGRAPH_HOST=memgraph
      - MEMGRAPH_PORT=7687
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LOG_LEVEL=DEBUG
      - SCIP_GO_PATH=/usr/local/bin/scip-go
    volumes:
      - shared-data:/data
      - ./src:/app/src:ro  # 开发模式：挂载源代码
      - /Users/tal/projects/goods-manager-svc:/Users/tal/projects/goods-manager-svc:ro
      - /Users/tal/projects/scm-order:/Users/tal/projects/scm-order:ro
    depends_on:
      - memgraph
      - redis
    networks:
      - aletheia-net

  # Celery Worker (异步任务)
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    platform: linux/amd64
    command: uv run celery -A src.backend.celery_app worker -l info -Q celery,ingestion,wiki
    env_file:
      - .env
    environment:
      - MEMGRAPH_HOST=memgraph
      - REDIS_HOST=redis
    volumes:
      - shared-data:/data
      - ./src:/app/src:ro
    depends_on:
      - redis
      - memgraph
    networks:
      - aletheia-net

  # Memgraph 图数据库
  memgraph:
    platform: linux/amd64
    image: memgraph/memgraph-mage:latest
    ports:
      - "7687:7687"
      - "7444:7444"
    volumes:
      - memgraph-data:/var/lib/memgraph
      - shared-data:/data
    environment:
      - MEMGRAPH_LOG_LEVEL=INFO
    networks:
      - aletheia-net

  # Redis (缓存 + 任务队列)
  redis:
    platform: linux/amd64
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - aletheia-net

  # 前端 (React + Vite)
  frontend:
    platform: linux/amd64
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
      target: builder
    command: npm run dev
    ports:
      - "3000:5173"
    volumes:
      - ./src/frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - api
    networks:
      - aletheia-net

volumes:
  memgraph-data:
  redis-data:
  shared-data:

networks:
  aletheia-net:
    driver: bridge
